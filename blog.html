<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AxionOS Blog</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'deep-midnight': '#0c0c0b',
            'faded-steel': '#1f2228',
            'frost-white': '#ffffff',
            'whisper-gray': '#474747',
          },
          fontFamily: {
            'nothing': ['"Space Grotesk"', 'system-ui', 'sans-serif'],
            'sans': ['"DM Sans"', 'sans-serif'],
            'mono': ['"Geist Mono"', 'monospace'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/new_home.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/blog.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <script src="posts.js"></script>
  <style>
    body { background-color: #0c0c0b; color: white; font-family: 'DM Sans', sans-serif; }
    .site-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
    .featured-post, .blog-card { background: #0a0a0a !important; border: 1px solid rgba(255,255,255,0.05) !important; border-radius: 24px !important; }
    .post-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
  </style>
</head>

<body>
  <div class="fixed inset-0 z-[0] overflow-hidden bg-[#050505] pointer-events-none">
    <div class="ambient-orb absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] rounded-full bg-[#1e3a8a] opacity-10 blur-[120px] mix-blend-screen"></div>
    <div class="ambient-orb absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-[#4c1d95] opacity-5 blur-[150px] mix-blend-screen"></div>
  </div>

  <header class="site-header relative z-10 pt-16">
    <div class="container header-inner text-center">
      <h1 class="site-title text-5xl md:text-7xl mb-4">Blog.</h1>
      <p class="site-subtitle text-whisper-gray text-xl">Changelogs and news from the team.</p>
    </div>
  </header>

  <main class="container relative z-10">
    <section id="featured-post" class="featured-post mb-12"></section>
    <section id="older-posts" class="blog-grid"></section>
  </main>

  <script>
    function renderBlogPosts() {
      const featuredContainer = document.getElementById('featured-post');
      const olderContainer = document.getElementById('older-posts');

      if (!window.posts || !window.posts.length) {
        featuredContainer.innerHTML = '<p>No blog posts found.</p>';
        return;
      }

      const sorted = [...window.posts].sort((a, b) => new Date(b.date) - new Date(a.date));
      const [latest, ...older] = sorted;

      const author = latest.author || {};
      const date = new Date(latest.date).toLocaleDateString(undefined, {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });

      featuredContainer.innerHTML = `
      <article class="featured-split">
        <div class="featured-image" style="background-image:url('${latest.banner || 'assets/default-banner.jpg'}')"></div>
        <div class="featured-text">
          <p class="featured-date">${date}</p>
          <h2 class="featured-title"><a href="post.html?id=${latest.id}">${latest.title}</a></h2>
          <p class="featured-summary">${latest.summary}</p>
          <div class="featured-author">
            <span class="material-symbols-outlined">person_outline</span>
            ${author.name || 'Unknown'} (${author.username || ''})
          </div>
          <a href="post.html?id=${latest.id}" class="read-more">Read More →</a>
        </div>
      </article>
    `;

    older.forEach(post => {
      const article = document.createElement('article');
      const author = post.author || {};
      const date = new Date(post.date).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
      article.classList.add('blog-card');

      article.style.backgroundImage = `url('${post.banner || 'assets/default-banner.jpg'}')`;
      article.style.backgroundSize = 'cover';
      article.style.backgroundPosition = 'center';
      article.style.position = 'relative';
      article.style.color = '#fff';
      article.style.overflow = 'hidden';

      const overlay = document.createElement('div');
      overlay.style.position = 'absolute';
      overlay.style.top = 0;
      overlay.style.left = 0;
      overlay.style.width = '100%';
      overlay.style.height = '100%';
      overlay.style.background = 'rgba(0, 0, 0, 0.5)';
      overlay.style.zIndex = 1;
      article.appendChild(overlay);

      const cardContent = document.createElement('div');
      cardContent.classList.add('card-content');
      cardContent.style.position = 'relative';
      cardContent.style.zIndex = 2;
      cardContent.innerHTML = `
        <p class="tagline">${post.tagline || ''}</p>
        <h3 class="post-title">${post.title}</h3>
        <p class="post-meta">
          <span class="material-symbols-outlined">calendar_today</span> ${date}
          <span class="material-symbols-outlined">person_outline</span> ${author.name || 'Unknown'} (${author.username || ''})
        </p>
        <a href="post.html?id=${post.id}" class="read-more">Read More →</a>
      `;
      article.appendChild(cardContent);

      olderContainer.appendChild(article);
    });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', renderBlogPosts);
    } else {
      if (window.posts) {
        renderBlogPosts();
      } else {
        const checkPosts = setInterval(() => {
          if (window.posts) {
            clearInterval(checkPosts);
            renderBlogPosts();
          }
        }, 50);
        setTimeout(() => clearInterval(checkPosts), 5000);
      }
    }
  </script>

</body>

</html>

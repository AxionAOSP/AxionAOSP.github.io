<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AxionAOSP - Downloads</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'deep-midnight': '#0c0c0b',
              'faded-steel': '#1f2228',
              'frost-white': '#ffffff',
              'whisper-gray': '#474747',
            },
            fontFamily: {
              'nothing': ['"Space Grotesk"', 'system-ui', 'sans-serif'],
              'sans': ['"DM Sans"', 'sans-serif'],
              'mono': ['"Geist Mono"', 'monospace'],
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="css/new_home.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/downloads.css" />
    <style>
        body { background-color: #0c0c0b; color: white; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
        .cdn-access-card, .device-card { background: #0a0a0a !important; border: 1px solid rgba(255,255,255,0.05) !important; border-radius: 24px !important; }
        .highlight { color: #ffffff !important; }
    </style>
</head>

<body>
    <div class="fixed inset-0 z-[0] overflow-hidden bg-[#050505] pointer-events-none">
      <div class="ambient-orb absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] rounded-full bg-[#1e3a8a] opacity-10 blur-[120px] mix-blend-screen"></div>
      <div class="ambient-orb absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-[#4c1d95] opacity-5 blur-[150px] mix-blend-screen"></div>
    </div>

    <section id="downloads" class="relative z-10 pt-16">
        <div class="container text-center">
            <h1 class="text-5xl md:text-8xl mb-8">
                Experience the 
                <br>
                <span class="highlight">Revolution.</span>
            </h1>

            <div class="cdn-access-card mx-auto max-w-4xl">
                <div class="cdn-card-content">
                    <div class="cdn-card-left">
                        <i class="fas fa-cloud cdn-cloud-icon"></i>
                        <div class="cdn-card-text">
                            <h2 class="cdn-card-title">Direct CDN Access</h2>
                            <p class="cdn-card-description text-whisper-gray">Access ROM files directly from our CDN.</p>
                        </div>
                    </div>
                    <a href="https://cdn.axionos.org/" target="_blank" rel="noopener noreferrer" class="cdn-visit-btn">
                        <i class="fas fa-external-link-alt"></i>
                        <span>Visit CDN</span>
                    </a>
                </div>
            </div>

            <div class="search-container">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="deviceSearch" placeholder="Search by device name or codename..." />
                </div>
            </div>

            <!-- Brand filters container - will be populated by JavaScript -->
            <div class="brand-filters filter-container"></div>

            <div class="downloads-grid">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading devices...</p>
                </div>
            </div>
        </div>
    </section>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="close-btn" id="closeModalBtn" aria-label="Close">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.0.2/marked.min.js"></script>
    <script src="js/downloads.js"></script>
</body>
</html>

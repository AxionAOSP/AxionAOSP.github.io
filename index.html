<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axion OS | Pure Power.</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Geist+Mono:wght@400&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'deep-midnight': '#0c0c0b',
            'faded-steel': '#1f2228',
            'frost-white': '#ffffff',
            'whisper-gray': '#474747',
          },
          fontFamily: {
            'nothing': ['"Space Grotesk"', 'system-ui', 'sans-serif'],
            'sans': ['"DM Sans"', 'sans-serif'],
            'mono': ['"Geist Mono"', 'monospace'],
          }
        }
      }
    }
  </script>

  <script src="js/vendor/lenis.min.js"></script>
  <script src="js/vendor/gsap.min.js"></script>
  <script src="js/vendor/ScrollTrigger.min.js"></script>

  
  <link rel="stylesheet" href="css/new_home.css" />

  <style>
    /* Iframe Shell Specific Styles */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden; /* Hide scrollbar on shell */
      background-color: #0c0c0b;
    }
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      z-index: 50;
      border-bottom: 1px solid #1f2228;
      background-color: rgba(12, 12, 11, 0.8);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      box-sizing: border-box;
    }
    #iframeWrapper {
      position: absolute;
      top: 80px;
      left: 0;
      width: 100%;
      height: calc(100vh - 80px);
      z-index: 10;
    }
    #contentFrame {
      width: 100%;
      height: 100%;
      border: none;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
  </style>

  <script>
    let isMenuOpen = false;
    
    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      const links = menu.querySelectorAll('a');
      
      if (!isMenuOpen) {
        // Open Menu
        menu.classList.remove('hidden');
        menu.classList.add('flex');
        gsap.fromTo(menu, 
          { y: -20, opacity: 0 }, 
          { y: 0, opacity: 1, duration: 0.4, ease: "power3.out" }
        );
        gsap.fromTo(links, 
          { y: 10, opacity: 0 }, 
          { y: 0, opacity: 1, duration: 0.3, stagger: 0.05, delay: 0.1, ease: "power2.out" }
        );
        isMenuOpen = true;
      } else {
        // Close Menu
        gsap.to(menu, { 
          y: -10, 
          opacity: 0, 
          duration: 0.3, 
          ease: "power2.in",
          onComplete: () => {
            menu.classList.add('hidden');
            menu.classList.remove('flex');
          }
        });
        isMenuOpen = false;
      }
    }
  </script>

</head>

<body>
  
  <nav>
    <a href="home.html#header_intro" onclick="loadPage(event)" class="font-nothing text-xl text-white hover:text-white">AXION OS.</a>
    
    <!-- Desktop Nav Links -->
    <div class="hidden md:flex gap-8 uppercase text-sm font-bold tracking-wider items-center">
      <a href="about.html" class="nav-link" onclick="loadPage(event)">About</a>
      <a href="blog.html#blog" class="nav-link" onclick="loadPage(event)">Blog</a>
      <a href="team.html" class="nav-link" onclick="loadPage(event)">Team</a>
      <a href="screenshots.html" class="nav-link" onclick="loadPage(event)">Screenshots</a>
    </div>
    
    <div class="flex items-center gap-4">
      <a href="download.html#downloads" onclick="loadPage(event)" class="btn-filled text-sm hidden sm:inline-flex">Download Axion</a>
      
      <!-- Mobile Menu Toggle Button -->
      <button onclick="toggleMobileMenu()" class="md:hidden text-white focus:outline-none p-2 ml-2 hover:bg-white/10 rounded-full transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>

    <!-- Mobile Dropdown Menu -->
    <div id="mobile-menu" class="hidden absolute top-[80px] left-0 w-full bg-[#0c0c0b]/95 backdrop-blur-2xl border-b border-faded-steel flex-col md:hidden items-center py-6 gap-6 uppercase text-sm font-bold tracking-wider shadow-2xl z-50">
      <a href="about.html" class="nav-link w-full text-center" onclick="loadPage(event); toggleMobileMenu();">About</a>
      <a href="blog.html#blog" class="nav-link w-full text-center" onclick="loadPage(event); toggleMobileMenu();">Blog</a>
      <a href="team.html" class="nav-link w-full text-center" onclick="loadPage(event); toggleMobileMenu();">Team</a>
      <a href="screenshots.html" class="nav-link w-full text-center" onclick="loadPage(event); toggleMobileMenu();">Screenshots</a>
      <a href="download.html#downloads" onclick="loadPage(event); toggleMobileMenu();" class="btn-filled text-sm sm:hidden mt-2 w-3/4 mx-auto text-center">Download Axion</a>
    </div>
  </nav>

  <div id="iframeWrapper">
    <iframe id="contentFrame" src="home.html"></iframe>
  </div>

  <script src="js/index.js"></script>
  <script src="js/iframe.js"></script>
</body>

</html>

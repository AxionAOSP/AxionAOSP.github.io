<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axion OS | Pure Power.</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Geist+Mono:wght@400&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'deep-midnight': '#0c0c0b',
            'faded-steel': '#1f2228',
            'frost-white': '#ffffff',
            'whisper-gray': '#474747',
          },
          fontFamily: {
            'nothing': ['"Space Grotesk"', 'system-ui', 'sans-serif'],
            'sans': ['"DM Sans"', 'sans-serif'],
            'mono': ['"Geist Mono"', 'monospace'],
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  
  <link rel="stylesheet" href="css/new_home.css" />

  <style>
    /* Iframe Shell Specific Styles */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden; /* Hide scrollbar on shell */
      background-color: #0c0c0b;
    }
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      z-index: 50;
      border-bottom: 1px solid #1f2228;
      background-color: rgba(12, 12, 11, 0.8);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      box-sizing: border-box;
    }
    #iframeWrapper {
      position: absolute;
      top: 80px;
      left: 0;
      width: 100%;
      height: calc(100vh - 80px);
      z-index: 10;
    }
    #contentFrame {
      width: 100%;
      height: 100%;
      border: none;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
  </style>

</head>

<body>
  
  <nav>
    <a href="home.html#header_intro" onclick="loadPage(event)" class="font-nothing text-xl text-white hover:text-white">AXION OS.</a>
    
    <div class="hidden md:flex gap-8 uppercase text-sm font-bold tracking-wider">
      <a href="about.html" class="nav-link" onclick="loadPage(event)">About</a>
      <a href="blog.html#blog" class="nav-link" onclick="loadPage(event)">Blog</a>
      <a href="team.html" class="nav-link" onclick="loadPage(event)">Team</a>
      <a href="screenshots.html" class="nav-link" onclick="loadPage(event)">Screenshots</a>
    </div>
    
    <a href="download.html#downloads" onclick="loadPage(event)" class="btn-filled text-sm">Download Axion</a>
  </nav>

  <div id="iframeWrapper">
    <iframe id="contentFrame" src="home.html"></iframe>
  </div>

  <script src="js/index.js"></script>
  <script src="js/iframe.js"></script>
</body>

</html>
